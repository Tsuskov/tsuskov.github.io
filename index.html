<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tim Suskov</title>
        <meta name="description" content="Tim Suskov — developer in Berlin. Profile, contributions and projects, under x-ray." />
        <link rel="icon" type="image/png" href="favicon.png" />
        <link rel="apple-touch-icon" href="apple-touch-icon.png" />
        <meta property="og:title" content="Tim Suskov" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://tsuskov.github.io/" />
        <meta property="og:description" content="Developer in Berlin. Profile, contributions and projects, under x-ray." />
        <meta property="og:image" content="https://tsuskov.github.io/og.png" />
        <meta name="twitter:card" content="summary_large_image" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main class="container">
            <header class="profile">
                <img id="avatar" src="avatar-xray.png" alt="tsuskov" />
                <h1 class="profile-name">Tim Suskov</h1>
                <p class="profile-sub">
                    Berlin ·
                    <a href="https://github.com/tsuskov">github.com/tsuskov</a>
                </p>
                <p class="profile-stats" id="profile-stats"></p>
            </header>

            <section class="section">
                <h2 class="section-title">Contributions</h2>
                <p class="section-sub" id="contrib-total"></p>
                <div id="contrib-graph"></div>
            </section>

            <section class="section">
                <h2 class="section-title">Repositories</h2>
                <div id="repo-list"></div>
            </section>

            <section class="section">
                <h2 class="section-title">Specimen</h2>
                <img id="batman" src="batman.png" alt="Batman x-ray" />
                <p class="caption">subject: lego batman · former identity · status: deceased</p>
            </section>

            <footer class="footer">
                <a href="https://github.com/tsuskov">github.com/tsuskov</a>
            </footer>
        </main>

        <script src="contributions.js"></script>
    </body>
</html>
